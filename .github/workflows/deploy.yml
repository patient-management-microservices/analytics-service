name: Deploy Analytics Service

on:
  workflow_run:
    workflows: ["Build and Publish Docker Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    steps:
      - name: Deploy Analytics Service
        run: |
          cd /home/dilshanjay/Apps/patient-management/patient-management-devops

          echo "Updating DevOps repository..."
          git fetch origin
          git reset --hard origin/main

          echo "Pulling latest analytics-service image..."
          docker compose pull analytics-service

          echo "Restarting analytics-service..."
          docker compose up -d analytics-service

          echo "Deployment completed!"